    <!-- Structured Data: Organization / InsuranceAgency -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "InsuranceAgency",
      "name": "Vamana Insurance Broking Pvt. Ltd.",
      "url": "https://vamanainsurance.com/",
      "logo": "https://vamanainsurance.com/favicon.ico",
      "description": "IRDAI-licensed insurance broker providing transparent advisory, tailored coverage and end-to-end claim support across India.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "areaServed": "IN",
      "sameAs": [
        "https://www.linkedin.com/company/vamana-insurance",
        "https://www.instagram.com/vamanainsurance"
      ],
      "contactPoint": [{
        "@type": "ContactPoint",
        "contactType": "customer service",
        "areaServed": "IN",
        "availableLanguage": ["en", "hi"]
      }]
    }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Vamana Insurance Broking IRDAI licensed?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Vamana Insurance Broking Pvt. Ltd. is a licensed insurance broker regulated by the Insurance Regulatory and Development Authority of India (IRDAI)."
          }
        },
        {
          "@type": "Question",
          "name": "What types of insurance do you offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We advise on health, motor, life, property, marine, liability, construction and corporate insurance — tailored to individual and enterprise needs."
          }
        },
        {
          "@type": "Question",
          "name": "Do you help with claims?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Our team handles claims end-to-end — documentation, insurer follow-ups and disbursal — so you don't navigate the process alone."
          }
        }
      ]
    }
    </script>
